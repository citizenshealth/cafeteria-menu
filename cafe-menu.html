<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;

    --text: #000000;
    --muted: #222222;
    --light-gray: #333333;

  html, body {
    width: 100%; height: 100%;
    background: #ffffff;
    font-family: 'Barlow', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--charcoal);
    color: white;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 70px;
    height: 120px;
    flex-shrink: 0;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 0.03em;
  }

  .brand-sub {
    font-size: 16px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #aaa;
    margin-top: 5px;
  }

  .header-info { text-align: right; }

  .header-date {
    font-size: 20px;
    color: #aaa;
    letter-spacing: 0.04em;
  }

  .header-clock {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 50px;
    font-weight: 700;
    line-height: 1;
    margin-top: 2px;
  }

  /* MEAL BANNER */
  .meal-banner {
    color: white;
    text-align: center;
    padding: 15px 0;
    font-size: 17px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 600;
    flex-shrink: 0;
  }
  .meal-banner.breakfast { background: var(--banner-breakfast); }
  .meal-banner.lunch     { background: var(--banner-lunch); }
  .meal-banner.closed    { background: #555; }

  /* MAIN */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 36px 80px 20px;
    overflow: hidden;
  }

  /* PAGE TITLE */
  .page-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 90px;
    font-weight: 800;
    font-style: normal;
    color: #222222;
    margin-bottom: 20px;
    line-height: 1;
  }

  /* SINGLE COLUMN LAYOUT */
  .menu-columns {
    display: flex;
    flex-direction: column;
    flex: 1;
    max-width: 1400px;
  }

  .menu-column {
    display: flex;
    flex-direction: column;
  }

  /* SECTION HEADING */
  .col-heading {
    font-size: 20px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--light-gray);
    font-weight: 600;
    padding-bottom: 14px;
    border-bottom: 3px solid #64c2dc;
    margin-bottom: 0;
  }

  /* MENU ROW */
  .menu-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px dotted #ccc;
    gap: 16px;
  }

  .menu-row:last-child {
    border-bottom: 1px dotted #ccc;
  }

  .row-left {
    flex: 1;
    min-width: 0;
  }

  .row-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 44px;
    font-weight: 700;
    font-style: normal;
    color: #000000;
    line-height: 1.1;
  }

  .row-desc {
    font-size: 26px;
    color: var(--muted);
    margin-top: 2px;
  }

  .row-right {
    display: flex;
    align-items: baseline;
    gap: 18px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .row-cal {
    font-size: 26px;
    color: var(--light-gray);

    font-family: 'Barlow Condensed', sans-serif;
    font-size: 50px;
    font-weight: 800;
    color: var(--red);
    line-height: 1;

    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 12px;

    font-size: 100px;
    font-style: normal;
    font-weight: 800;
    color: #222222;

    margin-top: 12px;

  }

    to   { opacity: 1; transform: translateY(0); }
  }

</style>

// ============================================================
// DATE & TIME LOGIC
// ============================================================

// Week 1 anchor: The Monday of the current week 1.
// Today is Tuesday March 18, 2026 = Week 1, Tuesday
// So Monday of this week = March 17, 2026
const WEEK1_MONDAY = new Date(2026, 2, 16); // March 16, 2026 (month is 0-indexed)

function getWeekAndDay(now) {
  const msPerDay = 86400000;
  const dayOfWeek = now.getDay(); // 0=Sun, 1=Mon...5=Fri, 6=Sat

  // Find Monday of the current week
  const daysFromMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  const thisMonday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - daysFromMonday);

  const diffMs = thisMonday - WEEK1_MONDAY;
  const diffWeeks = Math.floor(diffMs / (7 * msPerDay));
  const weekNum = ((diffWeeks % 4) + 4) % 4 + 1; // 1–4, cycling

  // dayNum: 1=Mon, 2=Tue, 3=Wed, 4=Thu, 5=Fri
  const dayNum = dayOfWeek === 0 ? 0 : dayOfWeek; // 0 = Sunday/weekend

  return { weekNum, dayNum };
}

function getMealType(now) {
  const h = now.getHours();
  const m = now.getMinutes();
  const totalMin = h * 60 + m;
  const breakfastDisplay = 7 * 60;       // 7:00 AM — start showing breakfast
  const breakfastEnd     = 9 * 60 + 30;  // 9:30 AM — breakfast ends
  const lunchPreview     = 9 * 60 + 30;  // 9:30 AM — start showing lunch
  const lunchEnd         = 13 * 60 + 30; // 1:30 PM — lunch ends

  if (totalMin >= breakfastDisplay && totalMin < breakfastEnd) return 'breakfast';
  if (totalMin >= lunchPreview && totalMin < lunchEnd) return 'lunch';
  return 'closed';
}

function getServiceStatus(now) {
  const totalMin = now.getHours() * 60 + now.getMinutes();
  if (totalMin >= 7 * 60 && totalMin < 7 * 60 + 45) return 'breakfast-preview';
  if (totalMin >= 7 * 60 + 45 && totalMin < 9 * 60 + 30) return 'breakfast-open';
  if (totalMin >= 9 * 60 + 30 && totalMin < 11 * 60 + 30) return 'lunch-preview';
  if (totalMin >= 11 * 60 + 30 && totalMin < 13 * 60 + 30) return 'lunch-open';
  return 'closed';
}

// ============================================================
// RENDER
// ============================================================

const DAY_NAMES = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function formatTime(now) {
  let h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m} ${ampm}`;
}

function renderMenu() {
  const now = new Date();
  const { weekNum, dayNum } = getWeekAndDay(now);
  const mealType = getMealType(now);
  const serviceStatus = getServiceStatus(now);
  const totalMin = now.getHours() * 60 + now.getMinutes();

  // Clock & date
  document.getElementById('clock-display').textContent = formatTime(now);
  document.getElementById('date-display').textContent =
    `${DAY_NAMES[now.getDay()]}, ${MONTH_NAMES[now.getMonth()]} ${now.getDate()}`;

  const banner = document.getElementById('meal-banner');
  const main = document.getElementById('main-content');

  // Weekend
  if (dayNum === 0 || dayNum === 6) {
    banner.className = 'meal-banner closed';
    banner.textContent = 'Cafeteria Closed — Weekend';
    main.innerHTML = closedHTML("Cafeteria Closed", "Breakfast 7:45–9:30 AM", "Lunch 11:30 AM–1:30 PM");
    return;
  }

  // Before 7 AM or after 1:30 PM
  if (mealType === 'closed') {
    banner.className = 'meal-banner closed';
    if (totalMin < 7 * 60) {
      banner.textContent = 'Cafeteria Closed';
      main.innerHTML = closedHTML("Cafeteria Hours", "Breakfast 7:45–9:30 AM", "Lunch 11:30 AM–1:30 PM");
    } else {
      banner.textContent = '';
      main.innerHTML = closedHTML("See You Tomorrow", "Breakfast 7:45–9:30 AM", "Lunch 11:30 AM–1:30 PM");
    }
    return;
  }

  const dayData = MENU[weekNum]?.[dayNum];

  if (!dayData) {
    banner.className = 'meal-banner closed';
    banner.textContent = 'Menu Unavailable';
    main.innerHTML = closedHTML("No Menu Found", "Please check back shortly.", "");
    return;
  }

  const items = dayData[mealType] || [];
  const daily = DAILY_ITEMS[mealType] || [];
  const allItems = [...items, ...daily];

  banner.className = `meal-banner ${mealType}`;
  if (serviceStatus === 'breakfast-preview')      banner.textContent = '☀️  Breakfast  ·  Service begins at 7:45 AM';
  else if (serviceStatus === 'breakfast-open')    banner.textContent = '☀️  Breakfast  ·  Now Serving  ·  Until 9:30 AM';
  else if (serviceStatus === 'lunch-preview')     banner.textContent = '🍽️  Lunch  ·  Coming up at 11:30 AM';
  else if (serviceStatus === 'lunch-open')        banner.textContent = '🍽️  Lunch  ·  Now Serving  ·  Until 1:30 PM';

  const dayName = DAY_NAMES[now.getDay()];
  const mealLabel = mealType === 'breakfast' ? 'Breakfast' : 'Lunch';
  const pageTitle = serviceStatus.includes('preview')
    ? `${dayName} ${mealLabel} — Coming Up`
    : `${dayName} ${mealLabel}`;

  main.innerHTML = `
    <div class="page-title">${pageTitle}</div>
    <div class="menu-columns">
      ${buildColumns(allItems)}
    </div>
  `;
}

function buildColumns(items) {
  return `
    <div class="menu-column">
      <div class="col-heading">Today's Selections</div>
      ${items.map(rowHTML).join('')}
    </div>
  `;
}

function rowHTML(item) {
  let priceDisplay = '';
  let calDisplay = '';
  if (item.price) {
    const parts = item.price.split('·');
    priceDisplay = parts[0].trim().replace('$', '').trim();
    if (parts[1]) calDisplay = parts[1].trim().replace(' cal', '') + ' cal';
  }
  return `
    <div class="menu-row">
      <div class="row-left">
        <div class="row-name">${item.name}</div>
        ${item.meta ? `<div class="row-desc">${item.meta}</div>` : ''}
      </div>
      <div class="row-right">
        ${calDisplay ? `<span class="row-cal">${calDisplay}</span>` : ''}
        ${priceDisplay ? `<span class="row-price">${priceDisplay}</span>` : ''}
      </div>
    </div>
  `;
}

function closedHTML(title, msg, hours) {
  return `
    <div class="closed-state">
      <div class="closed-title">${title}</div>
      ${msg ? `<div class="closed-msg">${msg}</div>` : ''}
      ${hours ? `<div class="closed-hours">${hours}</div>` : ''}
    </div>
  `;
}

// Initial render + refresh every 30s
renderMenu();
setInterval(() => { renderMenu(); }, 30000);

// Clock ticks every second
setInterval(() => {
  const now = new Date();
  document.getElementById('clock-display').textContent = formatTime(now);
}, 1000);
</script>
